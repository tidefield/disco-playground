<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Disco Playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Playground controls">
        <div>
          <p class="eyebrow">RC Disco Playground</p>
          <h1>Write a tiny app. See it live.</h1>
        </div>
        <label class="slug-field">
          <span>App slug</span>
          <input id="slug" value="hello-rc" inputmode="url" autocomplete="off" />
        </label>
      </section>

      <section class="workspace">
        <div class="editor-panel">
          <div class="file-layout">
            <aside class="file-tree-panel" aria-label="Files">
              <div class="file-tree-title">
                <span>Files</span>
                <button id="new-file" type="button" title="New file">+</button>
              </div>
              <div id="file-tree" class="file-tree"></div>
            </aside>
            <div class="code-panel">
              <div class="filebar">
                <input id="file-path" autocomplete="off" spellcheck="false" aria-label="Current file path" />
                <button id="delete-file" type="button" title="Delete current file">Delete</button>
              </div>
              <textarea id="editor" spellcheck="false" aria-label="Code editor"></textarea>
            </div>
          </div>
        </div>

        <div class="preview-panel">
          <div class="preview-bar">
            <span id="status">Ready</span>
          </div>
          <iframe id="preview" title="Live preview" sandbox="allow-scripts allow-modals"></iframe>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
