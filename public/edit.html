<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Disco Playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Playground controls">
        <div>
          <p class="eyebrow">RC Disco Playground</p>
        </div>
        <form id="manifest-form" class="manifest-form">
          <input id="manifest-url" type="url" placeholder="Raw manifest URL" aria-label="Raw manifest URL" />
          <button type="submit">Pull manifest</button>
        </form>
        <a class="published-link" href="/" target="_blank" rel="noreferrer">View live page</a>
      </section>

      <section class="workspace">
        <div class="editor-panel">
          <div class="file-layout">
            <aside class="file-tree-panel" aria-label="Files">
              <div class="file-tree-title">
                <span>Files</span>
                <div class="file-tree-actions">
                  <button id="upload-folder" type="button" title="Upload build folder">Upload</button>
                  <button id="trash-files" type="button" title="Reset playground" aria-label="Reset playground">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M3 6h18" />
                      <path d="M8 6V4h8v2" />
                      <path d="M6 6l1 15h10l1-15" />
                      <path d="M10 10v7" />
                      <path d="M14 10v7" />
                    </svg>
                  </button>
                  <button id="new-file" type="button" title="New file">+</button>
                </div>
                <input id="folder-upload" type="file" webkitdirectory directory multiple hidden />
              </div>
              <div id="file-tree" class="file-tree"></div>
            </aside>
            <div class="code-panel">
              <div class="filebar">
                <input id="file-path" autocomplete="off" spellcheck="false" aria-label="Current file path" />
                <button id="delete-file" type="button" title="Delete current file">Delete</button>
              </div>
              <textarea id="editor" spellcheck="false" aria-label="Code editor"></textarea>
            </div>
          </div>
        </div>

        <div class="preview-panel">
          <div class="preview-bar">
            <span id="status">Ready</span>
          </div>
          <iframe id="preview" title="Live preview" sandbox="allow-scripts allow-modals"></iframe>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
